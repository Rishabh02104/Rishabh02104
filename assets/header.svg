<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@400;700&amp;display=swap');
      
      .bg {
        fill: #06070a;
      }
      .hud-line {
        stroke: #121820;
        stroke-width: 1;
      }
      .hud-glow {
        stroke: #00E5FF;
        stroke-opacity: 0.4;
        filter: url(#glow);
      }
      .text-title {
        font-family: 'Orbitron', monospace;
        font-size: 14px;
        fill: #00E5FF;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .text-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #5a6675;
      }
      .text-value {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #ffffff;
      }
      .text-accent {
        fill: #00FF66;
        font-weight: bold;
      }
      
      /* Animations */
      @keyframes pulse {
        0% { opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { opacity: 0.3; }
      }
      @keyframes rotate-cw {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rotate-ccw {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }
      @keyframes scanline {
        0% { transform: translateY(0px); }
        100% { transform: translateY(260px); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -40;
        }
      }
      
      .animated-pulse {
        animation: pulse 3s infinite ease-in-out;
      }
      .rotate-ring-1 {
        transform-origin: 130px 130px;
        animation: rotate-cw 20s infinite linear;
      }
      .rotate-ring-2 {
        transform-origin: 130px 130px;
        animation: rotate-ccw 15s infinite linear;
      }
      .scan {
        stroke: #00E5FF;
        stroke-opacity: 0.15;
        stroke-width: 1.5;
        animation: scanline 6s infinite linear;
      }
      .cursor {
        animation: blink 1s infinite;
        fill: #00E5FF;
      }
      .path-pulse {
        stroke-dasharray: 8 4;
        animation: dash 2s infinite linear;
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" rx="8" class="bg" />
  
  <!-- Cyber HUD Border Frame -->
  <rect x="10" y="10" width="780" height="240" rx="6" fill="none" stroke="#121a24" stroke-width="1.5" />
  
  <!-- Outer Corners -->
  <path d="M 8,25 L 8,8 L 25,8" fill="none" stroke="#00E5FF" stroke-width="2.5" />
  <path d="M 775,8 L 792,8 L 792,25" fill="none" stroke="#00E5FF" stroke-width="2.5" />
  <path d="M 8,235 L 8,252 L 25,252" fill="none" stroke="#00E5FF" stroke-width="2.5" />
  <path d="M 775,252 L 792,252 L 792,235" fill="none" stroke="#00E5FF" stroke-width="2.5" />
  
  <!-- Decorative Grid lines -->
  <line x1="260" y1="10" x2="260" y2="250" class="hud-line" />
  <line x1="10" y1="45" x2="790" y2="45" class="hud-line" />
  <line x1="260" y1="215" x2="790" y2="215" class="hud-line" />
  
  <!-- Scanner Overlay line -->
  <line x1="11" y1="0" x2="789" y2="0" class="scan" />

  <!-- LEFT PANEL: Holographic Neural Graphics Core -->
  <g transform="translate(0, 0)">
    <!-- Radial HUD grids -->
    <circle cx="130" cy="130" r="100" fill="none" stroke="#0d1520" stroke-width="1" />
    <circle cx="130" cy="130" r="85" fill="none" stroke="#121c2a" stroke-dasharray="4 8" />
    <circle cx="130" cy="130" r="70" fill="none" stroke="#101824" stroke-width="1" />
    
    <!-- Rotating Vector Rings -->
    <circle cx="130" cy="130" r="80" fill="none" stroke="#00E5FF" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="40 180 60 80" class="rotate-ring-1 hud-glow" />
    <circle cx="130" cy="130" r="55" fill="none" stroke="#00FF66" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="100 40 20 40" class="rotate-ring-2" />
    <circle cx="130" cy="130" r="92" fill="none" stroke="#00E5FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="5 15" class="rotate-ring-1" />

    <!-- Center Neural Graph Nodes -->
    <!-- Core Hub -->
    <circle cx="130" cy="130" r="8" fill="#00E5FF" filter="url(#glow)" class="animated-pulse" />
    <circle cx="130" cy="130" r="16" fill="none" stroke="#00E5FF" stroke-opacity="0.3" stroke-width="1" class="animated-pulse" />
    
    <!-- Outer Synaptic Nodes -->
    <g class="animated-pulse" style="animation-delay: 0.5s;">
      <line x1="130" y1="130" x2="90" y2="85" stroke="#00E5FF" stroke-opacity="0.4" stroke-width="1" class="path-pulse" />
      <circle cx="90" cy="85" r="4" fill="#00E5FF" />
      <text x="85" y="75" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00E5FF" text-anchor="end">AI_JOB_AGENT</text>
    </g>
    <g class="animated-pulse" style="animation-delay: 1.2s;">
      <line x1="130" y1="130" x2="165" y2="70" stroke="#00E5FF" stroke-opacity="0.4" stroke-width="1" class="path-pulse" />
      <circle cx="165" cy="70" r="4" fill="#00FF66" filter="url(#glow)" />
      <text x="172" y="73" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00FF66">RISHAVENDRA_OS</text>
    </g>
    <g class="animated-pulse" style="animation-delay: 0.8s;">
      <line x1="130" y1="130" x2="185" y2="155" stroke="#00E5FF" stroke-opacity="0.4" stroke-width="1" />
      <circle cx="185" cy="155" r="3.5" fill="#00E5FF" />
      <text x="192" y="158" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00E5FF">CAREERFORGE</text>
    </g>
    <g class="animated-pulse" style="animation-delay: 1.8s;">
      <line x1="130" y1="130" x2="75" y2="160" stroke="#00E5FF" stroke-opacity="0.3" stroke-width="1" />
      <circle cx="75" cy="160" r="3.5" fill="#00FF66" />
      <text x="70" y="172" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00FF66" text-anchor="middle">DRONE_MAP</text>
    </g>
    <g class="animated-pulse" style="animation-delay: 1.5s;">
      <line x1="130" y1="130" x2="120" y2="195" stroke="#00E5FF" stroke-opacity="0.3" stroke-width="1" />
      <circle cx="120" cy="195" r="3" fill="#00E5FF" />
      <text x="120" y="208" font-family="'Share Tech Mono', monospace" font-size="9" fill="#00E5FF" text-anchor="middle">SECURE_VOTE</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Console & System Specifications -->
  <g transform="translate(280, 20)">
    <!-- Header Title -->
    <text x="0" y="12" class="text-title">// SYSTEM SPECIFICATIONS CORE — v1.0.24</text>
    <line x1="0" y1="18" x2="495" y2="18" stroke="#121a24" stroke-width="1" />
    
    <!-- Specs Grid -->
    <!-- Host -->
    <text x="0" y="42" class="text-label">👤 HOST NAME:</text>
    <text x="140" y="42" class="text-value">Rishavendra Sharma (Rishabh02104)</text>
    
    <!-- Core -->
    <text x="0" y="65" class="text-label">🎓 SYSTEM CORE:</text>
    <text x="140" y="65" class="text-value">B.Tech Computer Science &amp; Engineering (Grad 2026)</text>
    
    <!-- Shell -->
    <text x="0" y="88" class="text-label">🐚 ACTIVE SHELL:</text>
    <text x="140" y="88" class="text-value">zsh / bash / powershell</text>
    
    <!-- Uptime -->
    <text x="0" y="111" class="text-label">⏱️ UPTIME CYCLE:</text>
    <text x="140" y="111" class="text-value">Continuous learning &amp; system optimization</text>
    
    <!-- Current Process -->
    <text x="0" y="134" class="text-label">⚙️ PROCESS RUN:</text>
    <text x="140" y="134" class="text-value">Agentic AI &amp; Volumetric WebGL Renderers</text>
    
    <!-- Diagnostics / Status -->
    <text x="0" y="157" class="text-label">🚀 SYS_STATUS:</text>
    <g transform="translate(140, 147)">
      <!-- Pulsing Green Beacon -->
      <circle cx="6" cy="6" r="4.5" fill="#00FF66" filter="url(#glow)" class="animated-pulse" />
      <text x="18" y="10" class="text-value text-accent">HANDSHAKE ESTABLISHED // ONLINE</text>
    </g>
  </g>

  <!-- LOWER RIGHT FOOTER CONSOLE -->
  <g transform="translate(280, 210)">
    <text x="0" y="24" font-family="'Share Tech Mono', monospace" font-size="12" fill="#5a6675">rishabh02104@neural_core:~$</text>
    <text x="210" y="24" font-family="'Share Tech Mono', monospace" font-size="12" fill="#00E5FF">execute --dashboard --verbose</text>
    <rect x="420" y="13" width="8" height="13" class="cursor" />
  </g>
</svg>
