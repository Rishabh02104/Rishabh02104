<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@400;700&amp;display=swap');
      
      .bg {
        fill: #06070a;
      }
      .board-grid {
        stroke: #101620;
        stroke-width: 1;
        fill: none;
      }
      .slot-card {
        fill: #090a0f;
        stroke: #121a24;
        stroke-width: 1.5;
        rx: 4;
      }
      .slot-active {
        stroke: #00E5FF;
        stroke-width: 1.5;
        fill: #090a0f;
        rx: 4;
        filter: url(#glow-cyan);
      }
      .text-title {
        font-family: 'Orbitron', monospace;
        font-size: 11px;
        fill: #00E5FF;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .text-tech {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #ffffff;
      }
      .text-dim {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #5a6675;
      }
      .circuit-trace {
        stroke: #1b263b;
        stroke-width: 1;
        fill: none;
      }
      
      @keyframes pulse {
        0%, 100% { stroke-opacity: 0.3; }
        50% { stroke-opacity: 0.9; }
      }
      .animated-pulse {
        animation: pulse 3s infinite ease-in-out;
      }
    </style>
    
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="8" class="bg" />
  
  <!-- Outer motherboard frame -->
  <rect x="15" y="15" width="770" height="170" rx="6" stroke="#121a24" stroke-width="1.5" fill="none" />
  
  <!-- Decorative Circuits in Background -->
  <path d="M 20,40 Q 100,20 180,40 T 340,40 T 500,40 T 660,40" class="circuit-trace" />
  <path d="M 20,160 Q 100,180 180,160 T 340,160 T 500,160 T 660,160" class="circuit-trace" />

  <!-- ======================================================== -->
  <!-- SLOT 01: CORE LANGUAGES -->
  <!-- ======================================================== -->
  <g transform="translate(30, 25)">
    <rect width="135" height="150" class="slot-card" />
    <line x1="0" y1="26" x2="135" y2="26" stroke="#121a24" stroke-width="1.5" />
    <circle cx="15" cy="13" r="3.5" fill="#00E5FF" filter="url(#glow-cyan)" />
    <text x="27" y="17" class="text-title">LANGUAGES</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="12" class="text-tech">▹ Python</text>
      <text x="0" y="32" class="text-tech">▹ TypeScript</text>
      <text x="0" y="52" class="text-tech">▹ JavaScript</text>
      <text x="0" y="72" class="text-tech">▹ SQL (Postgres)</text>
      <text x="0" y="92" class="text-tech">▹ HTML5 / CSS3</text>
    </g>
  </g>

  <!-- ======================================================== -->
  <!-- SLOT 02: FRONTEND / UI -->
  <!-- ======================================================== -->
  <g transform="translate(180, 25)">
    <rect width="135" height="150" class="slot-card" />
    <line x1="0" y1="26" x2="135" y2="26" stroke="#121a24" stroke-width="1.5" />
    <circle cx="15" cy="13" r="3.5" fill="#00FF66" />
    <text x="27" y="17" class="text-title">FRONTEND / UI</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="12" class="text-tech">▹ Next.js 15</text>
      <text x="0" y="32" class="text-tech">▹ Three.js / R3F</text>
      <text x="0" y="52" class="text-tech">▹ React.js</text>
      <text x="0" y="72" class="text-tech">▹ Tailwind CSS</text>
      <text x="0" y="92" class="text-tech">▹ GSAP / Motion</text>
    </g>
  </g>

  <!-- ======================================================== -->
  <!-- SLOT 03: BACKEND / CLOUD -->
  <!-- ======================================================== -->
  <g transform="translate(330, 25)">
    <rect width="135" height="150" class="slot-card" />
    <line x1="0" y1="26" x2="135" y2="26" stroke="#121a24" stroke-width="1.5" />
    <circle cx="15" cy="13" r="3.5" fill="#00E5FF" filter="url(#glow-cyan)" />
    <text x="27" y="17" class="text-title">BACKEND / DATA</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="12" class="text-tech">▹ FastAPI</text>
      <text x="0" y="32" class="text-tech">▹ Supabase</text>
      <text x="0" y="52" class="text-tech">▹ Node.js</text>
      <text x="0" y="72" class="text-tech">▹ PostgreSQL</text>
      <text x="0" y="92" class="text-tech">▹ MongoDB</text>
    </g>
  </g>

  <!-- ======================================================== -->
  <!-- SLOT 04: AI & ML -->
  <!-- ======================================================== -->
  <g transform="translate(480, 25)">
    <rect width="135" height="150" class="slot-card" />
    <line x1="0" y1="26" x2="135" y2="26" stroke="#121a24" stroke-width="1.5" />
    <circle cx="15" cy="13" r="3.5" fill="#00FF66" />
    <text x="27" y="17" class="text-title">AI &amp; ML SYSTEMS</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="12" class="text-tech">▹ LangChain</text>
      <text x="0" y="32" class="text-tech">▹ OpenCV</text>
      <text x="0" y="52" class="text-tech">▹ TensorFlow</text>
      <text x="0" y="72" class="text-tech">▹ PyTorch</text>
      <text x="0" y="92" class="text-tech">▹ Playwright</text>
    </g>
  </g>

  <!-- ======================================================== -->
  <!-- SLOT 05: TOOLKIT / DEVOPS -->
  <!-- ======================================================== -->
  <g transform="translate(630, 25)">
    <rect width="135" height="150" class="slot-card" />
    <line x1="0" y1="26" x2="135" y2="26" stroke="#121a24" stroke-width="1.5" />
    <circle cx="15" cy="13" r="3.5" fill="#00E5FF" filter="url(#glow-cyan)" />
    <text x="27" y="17" class="text-title">TOOLKIT</text>
    
    <g transform="translate(15, 45)">
      <text x="0" y="12" class="text-tech">▹ Git / GitHub</text>
      <text x="0" y="32" class="text-tech">▹ GitHub Actions</text>
      <text x="0" y="52" class="text-tech">▹ VS Code</text>
      <text x="0" y="72" class="text-tech">▹ Vercel</text>
      <text x="0" y="92" class="text-tech">▹ Linux CLI</text>
    </g>
  </g>
</svg>
