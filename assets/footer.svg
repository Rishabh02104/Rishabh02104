<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@400;700&amp;display=swap');
      
      .bg {
        fill: #06070a;
      }
      .line-main {
        stroke: #00E5FF;
        stroke-width: 1.5;
        filter: url(#glow);
      }
      .line-dim {
        stroke: #121a24;
        stroke-width: 1;
      }
      .text-diagnostic {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #5a6675;
      }
      .text-active {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00FF66;
        font-weight: bold;
      }
      .text-cyan {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00E5FF;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .animated-pulse {
        animation: pulse 2s infinite ease-in-out;
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="60" rx="8" class="bg" />
  
  <!-- Cyber Diagnostics Telemetry Bar -->
  <line x1="15" y1="15" x2="785" y2="15" class="line-dim" />
  <line x1="15" y1="15" x2="300" y2="15" class="line-main" />
  <line x1="500" y1="15" x2="600" y2="15" class="line-main" />

  <!-- Diagonal Tech Slits -->
  <path d="M 15,15 L 20,20 L 40,20 L 45,15" fill="none" stroke="#00E5FF" stroke-width="1" />
  <path d="M 785,15 L 780,20 L 760,20 L 755,15" fill="none" stroke="#00E5FF" stroke-width="1" />

  <!-- Diagnostics Text Grid -->
  <g transform="translate(25, 38)">
    <circle cx="6" cy="-4" r="3.5" fill="#00FF66" class="animated-pulse" />
    <text x="18" y="0" class="text-diagnostic">SYS_INTEGRITY: <tspan class="text-active">OK</tspan></text>
    
    <text x="170" y="0" class="text-diagnostic">SECTOR_HEALTH: <tspan class="text-cyan">100%</tspan></text>
    
    <text x="340" y="0" class="text-diagnostic">CRYPT_CORE: <tspan class="text-cyan">ACTIVE</tspan></text>
    
    <text x="500" y="0" class="text-diagnostic">LOC_SYS: <tspan class="text-diagnostic" fill="#ffffff">IND_NODE_2026</tspan></text>
    
    <text x="750" y="0" class="text-cyan" text-anchor="end">// END RUN_CYCLE</text>
  </g>
</svg>
