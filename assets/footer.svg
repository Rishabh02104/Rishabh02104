<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@400;700&amp;display=swap');
      
      .bg {
        fill: #06070a;
      }
      .line-main {
        stroke: #00E5FF;
        stroke-width: 1.5;
        filter: url(#glow);
      }
      .line-dim {
        stroke: #121a24;
        stroke-width: 1;
        fill: none;
      }
      .text-diagnostic {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #5a6675;
      }
      .text-active {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00FF66;
        font-weight: bold;
      }
      .text-cyan {
        font-family: 'Share Tech Mono', monospace;
        font-size: 11px;
        fill: #00E5FF;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes draw-trace {
        0% { stroke-dashoffset: 800; }
        100% { stroke-dashoffset: 0; }
      }
      .animated-pulse {
        animation: pulse 2s infinite ease-in-out;
      }
      .oscilloscope-trace {
        stroke-dasharray: 120 40 80 40;
        animation: draw-trace 12s infinite linear;
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="60" rx="8" class="bg" />
  
  <!-- Diagnostic Base line -->
  <path d="M 15,20 L 785,20" class="line-dim" />
  
  <!-- Oscilloscope Pulsing Heartbeat trace -->
  <path d="M 15,20 L 150,20 L 158,5 L 166,35 L 174,20 L 320,20 L 328,5 L 336,35 L 344,20 L 550,20 L 558,5 L 566,35 L 574,20 L 785,20" fill="none" class="line-main oscilloscope-trace" />

  <!-- Diagonal Tech Slits -->
  <path d="M 15,20 L 20,25 L 40,25 L 45,20" fill="none" stroke="#00E5FF" stroke-width="1" />
  <path d="M 785,20 L 780,25 L 760,25 L 755,20" fill="none" stroke="#00E5FF" stroke-width="1" />

  <!-- Diagnostics Text Grid -->
  <g transform="translate(25, 43)">
    <circle cx="6" cy="-4" r="3.5" fill="#00FF66" class="animated-pulse" />
    <text x="18" y="0" class="text-diagnostic">SYS_INTEGRITY: <tspan class="text-active">OK</tspan></text>
    
    <text x="170" y="0" class="text-diagnostic">SECTOR_HEALTH: <tspan class="text-cyan">100%</tspan></text>
    
    <text x="340" y="0" class="text-diagnostic">CRYPT_CORE: <tspan class="text-cyan">ACTIVE</tspan></text>
    
    <text x="500" y="0" class="text-diagnostic">LOC_SYS: <tspan class="text-diagnostic" fill="#ffffff">IND_NODE_2026</tspan></text>
    
    <text x="750" y="0" class="text-cyan" text-anchor="end">// END RUN_CYCLE</text>
  </g>
</svg>
